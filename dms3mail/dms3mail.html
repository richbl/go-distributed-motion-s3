<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">

<head>
  <meta charset="utf-8">
  <meta name="author" content="https://github.com/TedGoas/Cerberus">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="x-apple-disable-message-reformatting">
  <meta name="format-detection" content="telephone=no,address=no,email=no,date=no,url=no">
  <meta name="color-scheme" content="light">
  <meta name="dms3-project-version" content="1.4.6">
  <title>DMS3 Motion Detected</title>
  <!--[if gte mso 9]>
    <xml>
      <o:OfficeDocumentSettings>
        <o:AllowPNG/>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  <![endif]-->
  <style>
    /* Global text-size reset */
    html,
    body,
    table,
    td,
    a,
    img,
    div,
    p,
    ul,
    li,
    h2 {
      -ms-text-size-adjust: 100%;
      -webkit-text-size-adjust: 100%;
    }

    img {
      -ms-interpolation-mode: bicubic;
    }

    /* Responsive container fixes */
    @media only screen and (min-device-width: 320px) and (max-device-width: 374px) {
      u~div .email-container {
        min-width: 320px !important;
      }
    }

    @media only screen and (min-device-width: 375px) and (max-device-width: 413px) {
      u~div .email-container {
        min-width: 375px !important;
      }
    }

    @media only screen and (min-device-width: 414px) {
      u~div .email-container {
        min-width: 414px !important;
      }
    }

    /* Mobile font scaling */
    @media screen and (max-width: 600px) {
      .email-container td.content {
        font-size: 17px !important;
        line-height: 22px !important;
      }

      .email-container h2 {
        font-size: 20px !important;
        line-height: 24px !important;
      }

      .fluid-img {
        width: 100% !important;
        max-width: 100% !important;
        height: auto !important;
      }
    }
  </style>
</head>

<body style="margin: 0; padding: 0; background-color: #222222; -ms-text-size-adjust: 100%; -webkit-text-size-adjust: 100%; color-scheme: light;">
  <!-- Outer wrapper -->
  <div style="width: 100%; background-color: #222222; text-align: center;">
    <!--[if mso | IE]>
    <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #222222;">
    <tr><td>
    <![endif]-->

    <!-- Responsive container -->
    <div class="email-container" style="max-width: 600px; margin: 0 auto; width: 100%;">
      <!--[if mso]>
      <table align="center" role="presentation" cellspacing="0" cellpadding="0" border="0" width="600">
      <tr><td>
      <![endif]-->

      <!-- Main email table -->
      <table align="center" role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="border-spacing: 0; border-collapse: collapse; table-layout: fixed; margin: 0 auto;">

        <!-- Email Header -->
        <tr>
          <td style="background-color: #222222; padding: 15px 0 0;">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="border-spacing: 0; border-collapse: collapse; margin: 0 auto;">
              <tr>
                <td style="background-color: #ffffff; padding: 20px; text-align: center;">
                  <img src="cid:{{.Header}}" width="80%" alt="distributed-motion-s3" border="0" style="max-width: 100%; height: auto; display: block; margin: 0 auto; -ms-interpolation-mode: bicubic;" class="fluid-img">
                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Hero Image -->
        <tr>
          <td style="padding: 0;">
            <img src="cid:{{.Event}}" width="600" alt="security image capture" border="0" style="width: 100%; max-width: 600px; height: auto; display: block; margin: 0 auto; background: #ffffff; font-family: sans-serif; font-size: 15px; line-height: 15px; color: #000000; -ms-interpolation-mode: bicubic;" class="fluid-img">
          </td>
        </tr>

        <!-- Content Section -->
        <tr>
          <td style="padding: 0 0 15px;">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="border-spacing: 0; border-collapse: collapse; margin: 0 auto;">
              <tr>
                <td class="content" style="background-color: #ffffff; padding: 30px 25px; font-family: sans-serif; font-size: 15px; line-height: 22px; color: #222222;">

                  <h2 style="margin: 0 0 15px; font-family: sans-serif; font-size: 18px; line-height: 22px; color: #222222; font-weight: bold;">
                    A DMS<sup>3</sup> Motion Surveillance Event was Detected
                  </h2>

                  <ul style="margin: 0 0 15px 0; padding: 0 0 0 20px; list-style-type: disc; font-size: 15px; line-height: 20px; color: #222222; text-align: left;">
                    <li style="margin-bottom: 8px;"><strong>{{.Change}}%</strong> of image pixels changed in the event</li>
                    <li style="margin-bottom: 8px;">Event occurred at <strong>{{.Date}}</strong></li>
                    <li>Event reported by DMS<sup>3</sup> device client <strong>{{.Client}}</strong></li>
                  </ul>

                </td>
              </tr>
            </table>
          </td>
        </tr>

        <!-- Footer / Call-to-Action -->
        <tr>
          <td style="padding: 0 0 30px;">
            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="border-spacing: 0; border-collapse: collapse; margin: 0 auto;">
              <tr>
                <td style="background-color: #ffffff; padding: 20px; font-family: sans-serif; font-size: 15px; line-height: 20px; color: #222222; text-align: center;">
                  <a href="https://github.com/richbl/go-distributed-motion-s3" style="color: #222222; text-decoration: none; font-weight: bold; display: inline-block;">
                    <img src="cid:{{.Footer}}" alt="GitHub Logo" width="25" height="25" style="vertical-align: middle; margin-right: 8px; display: inline-block; -ms-interpolation-mode: bicubic;">
                    Contribute to the DMS<sup>3</sup> Project on GitHub
                  </a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>

      <!--[if mso]>
      </td></tr></table>
      <![endif]-->
    </div>

    <!--[if mso | IE]>
    </td></tr></table>
    <![endif]-->
  </div>
</body>

</html>
