<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="DMS3: Distributed Motion Sense Security System">

  <meta http-equiv="refresh" content="10">

  <link rel="icon" href="assets/img/favicon.png" sizes="any">
  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml">

  <title>{{.Title}}</title>

  <link type="text/css" rel="stylesheet" href="assets/css/bootstrap.min.css">
  <link type="text/css" rel="stylesheet" href="assets/css/paper-dashboard.css">
  <link href="https://fonts.googleapis.com/css?family=Muli:400,300" rel="stylesheet" type="text/css">
  <link type="text/css" rel="stylesheet" href="assets/css/icomoon-icons.css">
</head>

<body>
  <div class="wrapper">
    <div class="main-panel">

      <nav class="navbar navbar-default">
        <div class="container-fluid">
          <div class="navbar-header">
            <img src="assets/img/dms3logo.png" alt="DMS3 System Logo">
          </div>
        </div>
      </nav>

      <div class="content">
        <div class="container-fluid">

          <!-- Range directly over the slice. The `.` context becomes the DeviceMetrics struct -->
          {{range .Devices}}
          <div class="col-lg-3 col-sm-6">
            <div class="card">
              <div class="content">
                <div class="row">
                  <div class="col-xs-5">
                    <!-- Method calls directly on the struct -->
                    <div class="icon-big {{.IconStatus}} text-center">
                      <i class="{{.IconType}}"></i>
                    </div>
                  </div>
                  <div class="col-xs-7">
                    <div class="numbers">
                      <p>{{.Platform.Hostname}}</p>
                      {{.Platform.OSName}}
                      <br>
                      {{.Platform.Environment}}
                      <br>
                      {{.Platform.Kernel}}
                    </div>
                  </div>
                </div>
                <div class="footer">
                  <hr>
                  <div class="stats">
                    <i class="icon-stopwatch"></i> Uptime: {{.Period.Uptime}}
                    <br>

                    <!-- We access the struct's existing boolean field directly -->
                    {{if .ShowEventCount}}
                    <i class="icon-eye"></i> Events: {{.EventCount}}
                    <br>
                    {{else}}
                    <!-- '$' accesses the root `deviceData` object to call a method -->
                    <i class="icon-display"></i> Clients: {{$.ClientCount}}
                    <br>
                    {{end}}

                    <i class="icon-loop2"></i> Update: {{FormatDateTime .Period.LastReport}}
                  </div>
                </div>
              </div>
            </div>
          </div>
          {{end}}

        </div>
      </div>
    </div>
  </div>
</body>

</html>
